<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width,initial-scale=1.0">
	<link rel="icon" type="image/png" sizes="32x32"
		href="<%= htmlWebpackPlugin.files.publicPath %>img/icons/icon-32.png">

		href="<%= htmlWebpackPlugin.files.publicPath %>img/icons/icon-16.png">
	<meta property="og:title" content="Sia Central Lite Wallet" />

		content="Secure, open source, non-custodial Siacoin lite wallet. View transactions, send, and receive Siacoin without downloading the blockchain." />

	<meta property="og:url" content="<%= BASE_URL %>" />

	<link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
	<link rel="mask-icon" href="/img/safari-pinned-tab.svg" color="#5bbad5">

	<meta name="msapplication-TileColor" content="#2d89ef">
